name: Update stats from app

on:
  # Run hourly
  schedule:
    - cron: '0 * * * *'
  # Also allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest stats from app
        id: fetch
        env:
          # Same pattern as the ai-catalog-score app's daily-refresh workflow.
          # The URL is public (open dataset positioning) so no secret needed.
          STATS_ENDPOINT_URL: ${{ vars.STATS_ENDPOINT_URL || 'https://shopify-app-production-7e58.up.railway.app/api/public/stats' }}
        run: |
          # Fetch (10s timeout, fail on HTTP error, follow redirects)
          curl --fail --silent --show-error --max-time 10 --location \
            "$STATS_ENDPOINT_URL" \
            > stats.json.new
          # Sanity-check: must be valid JSON containing captures_total as a positive number
          if ! jq -e '(.captures_total | type == "number") and (.captures_total > 0)' stats.json.new > /dev/null 2>&1; then
            echo "::error::Fetched stats.json failed validation"
            cat stats.json.new
            rm -f stats.json.new
            exit 1
          fi
          # Pretty-print, then move into place
          jq '.' stats.json.new > stats.json
          rm -f stats.json.new
          echo "fetched=true" >> "$GITHUB_OUTPUT"

      - name: Commit if changed
        if: steps.fetch.outputs.fetched == 'true'
        run: |
          if git diff --quiet stats.json; then
            echo "No changes to stats.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git commit -m "stats: hourly refresh ($(jq -r '.captures_total' stats.json) captures)"
          git push
